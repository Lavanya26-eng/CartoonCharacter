<!DOCTYPE html>
<html>
<head>
    <title>Cartoon Character Quiz</title>
    <style>
        body{
            font-family: 'Comic Sans MS', cursive;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:600px;
            background:white;
            padding:25px;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
            text-align:center;
        }

        h1{
            color:#ff4081;
        }

        .question{
            font-size:22px;
            margin-bottom:15px;
            font-weight:bold;
        }

        .option{
            display:block;
            margin:10px;
            padding:12px;
            background:#ffe0b2;
            border-radius:10px;
            cursor:pointer;
            transition:0.3s;
        }

        .option:hover{
            background:#ffcc80;
            transform:scale(1.03);
        }

        button{
            background:#ff4081;
            color:white;
            border:none;
            padding:12px 20px;
            font-size:18px;
            border-radius:10px;
            cursor:pointer;
        }

        button:hover{
            background:#e91e63;
        }

        #result{
            font-size:24px;
            color:#4caf50;
            font-weight:bold;
            margin-top:20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎭 Cartoon Character Quiz 🎭</h1>

    <div id="quiz">
        <div class="question" id="question"></div>

        <label class="option">
            <input type="radio" name="answer" value="A">
            <span id="A"></span>
        </label>

        <label class="option">
            <input type="radio" name="answer" value="B">
            <span id="B"></span>
        </label>

        <label class="option">
            <input type="radio" name="answer" value="C">
            <span id="C"></span>
        </label>

        <label class="option">
            <input type="radio" name="answer" value="D">
            <span id="D"></span>
        </label>

        <br>
        <button onclick="nextQuestion()">Next ➡️</button>
    </div>

    <div id="result"></div>
</div>

<script>

const quizData = [
{
question:"Who lives in a pineapple under the sea?",
options:["Tom","SpongeBob","Mickey","Doraemon"],
answer:"B"
},
{
question:"Who is Mickey Mouse's dog?",
options:["Scooby","Pluto","Oggy","Tom"],
answer:"B"
},
{
question:"What color is Doraemon?",
options:["Red","Green","Blue","Yellow"],
answer:"C"
},
{
question:"Who is the enemy of Tom?",
options:["Jerry","Shinchan","Nobita","Motu"],
answer:"A"
},
{
question:"Who loves Krabby Patties?",
options:["Patrick","Shinchan","SpongeBob","Ben 10"],
answer:"C"
}
];

let currentQuestion = 0;
let score = 0;

function loadQuestion(){
    document.getElementById("question").innerText =
        quizData[currentQuestion].question;

    document.getElementById("A").innerText =
        quizData[currentQuestion].options[0];

    document.getElementById("B").innerText =
        quizData[currentQuestion].options[1];

    document.getElementById("C").innerText =
        quizData[currentQuestion].options[2];

    document.getElementById("D").innerText =
        quizData[currentQuestion].options[3];

    document.querySelectorAll("input[name='answer']")
    .forEach(r => r.checked = false);
}

function nextQuestion(){

    let selected =
    document.querySelector("input[name='answer']:checked");

    if(selected){
        if(selected.value === quizData[currentQuestion].answer){
            score++;
        }
    }

    currentQuestion++;

    if(currentQuestion < quizData.length){
        loadQuestion();
    }
    else{
        document.getElementById("quiz").style.display="none";

        let message="😊 Good Try!";

        if(score===5)
            message="🏆 Cartoon Master!";
        else if(score>=3)
            message="🌟 Great Job!";

        document.getElementById("result").innerHTML=
        `
        🎉 Quiz Completed! <br><br>
        Score: ${score}/${quizData.length}<br><br>
        ${message}
        `;
    }
}

loadQuestion();

</script>

</body>
</html>
